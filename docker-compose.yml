services:
  api:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "8000:8000"
    volumes:
      - api-data:/app/data
      - api-indexes:/app/indexes
      - api-schemas:/app/schemas
      - api-uploads:/app/uploaded_files
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api-data:
  api-indexes:
  api-schemas:
  api-uploads:
